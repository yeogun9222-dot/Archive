services:
  jake-postgres:
    image: postgres:16-alpine
    container_name: jake-postgres
    restart: "no"
    environment:
      POSTGRES_DB: jakedb
      POSTGRES_USER: jake
      POSTGRES_PASSWORD: jake1234
    volumes:
      - jake-postgres-data:/var/lib/postgresql/data
    networks:
      - jake-network

  jake-agent:
    build: .
    image: jake-agent
    container_name: jake-agent
    restart: "no"
    ports:
      - "8000:8000"
    environment:
      DB_HOST: jake-postgres
      DB_PORT: "5432"
      DB_NAME: jakedb
      DB_USER: jake
      DB_PASSWORD: jake1234
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_ARCHITECTS_KEY: ${NOTION_ARCHITECTS_KEY}
      NOTION_GUIDE_KEY: ${NOTION_GUIDE_KEY:-}
      TELEGRAM_GROUP_IDS: ${TELEGRAM_GROUP_IDS:-}
      TELEGRAM_RESPONSE_GROUP_IDS: ${TELEGRAM_RESPONSE_GROUP_IDS:-}
      KIWI_API_KEY: ${KIWI_API_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      TIMETREE_ACCESS_TOKEN: ${TIMETREE_ACCESS_TOKEN:-}
      TIMETREE_CALENDAR_ID: ${TIMETREE_CALENDAR_ID:-}
      GOOGLE_CREDENTIALS_B64: ${GOOGLE_CREDENTIALS_B64:-}
      GOOGLE_TOKEN_B64: ${GOOGLE_TOKEN_B64:-}
      GOOGLE_SHARED_CALENDAR_ID: ${GOOGLE_SHARED_CALENDAR_ID:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-yeogun9222-dot/Archive}
      GCP_BILLING_KEY_B64: ${GCP_BILLING_KEY_B64:-}
      GCP_BILLING_PROJECT: ${GCP_BILLING_PROJECT:-rugged-reality-500602-d7}
      GCP_BILLING_DATASET: ${GCP_BILLING_DATASET:-billing_export}
      GCP_BILLING_TABLE: ${GCP_BILLING_TABLE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - jake-postgres
    networks:
      - jake-network
    develop:
      watch:
        - action: rebuild
          path: ./main.py
        - action: rebuild
          path: ./jake_agent
        - action: rebuild
          path: ./requirements.txt

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: "no"
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://jake-agent:8000/v1
      OPENAI_API_KEY: jake-agent
      WEBUI_AUTH: "false"
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - jake-agent
    networks:
      - jake-network

volumes:
  jake-postgres-data:
  open-webui:
    external: true
    name: open-webui

networks:
  jake-network:
    external: true
    name: jake-network
