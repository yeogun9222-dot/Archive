services:
  jake-postgres:
    image: postgres:16-alpine
    container_name: jake-postgres
    restart: "no"
    environment:
      POSTGRES_DB: jakedb
      POSTGRES_USER: jake
      POSTGRES_PASSWORD: jake1234
    volumes:
      - jake-postgres-data:/var/lib/postgresql/data
    networks:
      - jake-network

  jake-agent:
    build: .
    image: jake-agent
    container_name: jake-agent
    restart: "no"
    ports:
      - "8000:8000"
    environment:
      DB_HOST: jake-postgres
      DB_PORT: "5432"
      DB_NAME: jakedb
      DB_USER: jake
      DB_PASSWORD: jake1234
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_ARCHITECTS_KEY: ${NOTION_ARCHITECTS_KEY}
      TELEGRAM_GROUP_IDS: ${TELEGRAM_GROUP_IDS:-}
      TELEGRAM_RESPONSE_GROUP_IDS: ${TELEGRAM_RESPONSE_GROUP_IDS:-}
      KIWI_API_KEY: ${KIWI_API_KEY:-}
      TIMETREE_ACCESS_TOKEN: ${TIMETREE_ACCESS_TOKEN:-}
      TIMETREE_CALENDAR_ID: ${TIMETREE_CALENDAR_ID:-}
    depends_on:
      - jake-postgres
    networks:
      - jake-network
    develop:
      watch:
        - action: rebuild
          path: ./main.py
        - action: rebuild
          path: ./jake_agent
        - action: rebuild
          path: ./requirements.txt

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: "no"
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    networks:
      - jake-network

volumes:
  jake-postgres-data:
  open-webui:
    external: true
    name: open-webui

networks:
  jake-network:
    external: true
    name: jake-network
