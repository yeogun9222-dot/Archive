        @media print {
            /* 1. 모든 요소의 배경색 강제 출력 (단계 구분선, 표 헤더 등 색상 유지) */

                print-color-adjust: exact !important;

            /* 여백과 행 간격을 조절하여 A4 1페이지에 오버플로우 없이 정확히 맞춥니다 */
            @page { size: A4 portrait; margin: 6mm; }
            body { background-color: white !important; padding: 0 !important; }
            
            /* 알림창(toast)과 버튼류 인쇄에서 완벽 차단 (3중 숨김 처리) */
            .no-print, #toast { display: none !important; opacity: 0 !important; visibility: hidden !important; }
            .report-container { box-shadow: none !important; border: none !important; width: 100% !important; max-width: none !important; padding: 0 !important; }
            
            header { margin-bottom: 8px !important; padding-bottom: 6px !important; }
            .grid { margin-bottom: 10px !important; gap: 6px !important; }
            .summary-card { padding: 6px !important; }
            .summary-val { font-size: 1.3rem !important; }
            #total-percent { font-size: 1.9rem !important; }
            
            /* 항목 추가(26개)로 인해 2페이지로 넘어가지 않도록 여백과 높이를 미세 조정 */
            .phase-divider { margin-top: 8px !important; margin-bottom: 3px !important; padding: 4px 10px !important; font-size: 11px !important; }
            
            .status-table th { padding: 4px 2px !important; font-size: 10px !important; }
            .status-table td { border-bottom: 1px solid #f1f5f9 !important; padding: 2px 2px !important; height: 24px !important; font-size: 10px !important; }
            .col-title { font-size: 11px !important; }
            .col-note { font-size: 10px !important; }
            .label { height: 18px !important; font-size: 9px !important; width: 46px !important; }
            .prog-container { height: 5px !important; margin-right: 5px !important; }
        }

                    "note": "글로벌 CS 통합 매뉴얼 수립 예정",

                    "isToday": false
          },
          {
                    "id": 17,
                    "phase": "4단계: 그랜드 오픈",
                    "title": "HFT 엔진 정식 가동 & 자동 정산",
                    "progress": 0,
                    "status": "PENDING",
                    "note": "수익 지급 스마트 컨트랙트 최종 가동",
                    "owner": "안동현, 정웅모",
                    "isToday": false
          },
          {
                    "id": 18,
                    "phase": "4단계: 그랜드 오픈",
                    "title": "행사 개최 및 글로벌 미디어 PR",
                    "progress": 0,
                    "status": "PENDING",
                    "note": "글로벌 크립토 뉴스 미디어 송출",
                    "owner": "김이석",
                    "isToday": false
          },
          {
                    "id": 19,
                    "phase": "4단계: 그랜드 오픈",
                    "title": "배당금 지급 및 바이백 집행",
                    "progress": 0,
                    "status": "PENDING",
                    "note": "투자자 바이백",
                    "owner": "김세호",

          },
          {
                    "id": 20,
                    "phase": "4단계: 그랜드 오픈",
                    "title": "상장 실행 및 소각 모니터링",
                    "progress": 0,
                    "status": "PENDING",
                    "note": "TGE 완료 및 토큰 이코노미 소각 모니터링",
                    "owner": "정웅모",
                    "isToday": false
          }
];
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let roadmapData = [...initialData];
        let db, auth, appId, isCloudReady = false;

        async function startApp() {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app); auth = getAuth(app);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'longrise-report';
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reports', 'current_status');
                    onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) { roadmapData = docSnap.data().data; }
                        updateUI();
                    });
                    isCloudReady = true;
                } else { updateUI(); }
            } catch (e) { updateUI(); }
            const now = new Date();
            document.getElementById('footer-date-text').innerText = `최종 업데이트: ${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
        }

        async function saveToFirestore() {
            if (!isCloudReady) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'reports', 'current_status');
            try { await setDoc(docRef, { data: roadmapData }); showToast("변경 사항이 저장되었습니다."); } catch (e) { }
        }

        function updateUI() { renderBoard(); renderAdmin(); }

        function renderBoard() {
            const content = document.getElementById('report-content');
            content.innerHTML = '';
            const phases = [...new Set(roadmapData.map(item => item.phase))];
            let totalProg = 0, countDone = 0, countIng = 0, countPending = 0, countToday = 0;

            phases.forEach(phase => {
                const phaseItems = roadmapData.filter(i => i.phase === phase);
                const avgProg = Math.round(phaseItems.reduce((acc, cur) => acc + cur.progress, 0) / phaseItems.length);
                content.innerHTML += `
                    <div class="phase-divider">
                        <span>${phase}</span>
                        <span style="font-size: 11px; opacity: 0.7;">완료 ${avgProg}%</span>
                    </div>
                    <table class="status-table">
                        <thead>
                            <tr style="font-size: 11px; color: #64748b; font-weight: 700; background-color: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                                <th class="col-id py-3">순번</th>
                                <th class="col-status py-3">상태</th>
                                <th class="col-owner py-3" style="color: #2563eb;">담당자</th>
                                <th class="col-title py-3">과업명</th>
                                <th class="col-note py-3">세부 현황</th>
                                <th class="col-prog py-3" style="text-align: right !important; padding-right: 20px !important;">진척도</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${phaseItems.map(item => {
                                totalProg += item.progress;
                                if(item.status === 'DONE') countDone++; else if(item.status === 'ING') countIng++; else countPending++;
                                if(item.isToday) countToday++;
                                const isDone = item.status === 'DONE';
                                const isIng = item.status === 'ING';
                                const isToday = item.isToday;
                                let labelClass = isDone ? 'label-done' : (isIng ? 'label-ing' : 'label-pending');
                                let labelText = isDone ? '완료' : (isIng ? '진행' : '대기');
                                if(isToday) { labelClass = 'label-today'; labelText = '금일'; }
                                const barColor = isToday ? 'bar-today' : (isDone ? 'bar-done' : 'bar-ing');
                                const rowBgClass = isToday ? 'row-today' : (isDone ? 'row-done' : (isIng ? 'row-ing' : 'row-pending'));
                                const titleStyle = isToday ? 'text-emerald-800' : (isDone ? 'text-slate-400 font-medium' : 'text-slate-900');
                                const managerStyle = isToday ? 'text-emerald-700 font-bold' : (isDone ? 'text-slate-400' : 'text-slate-700');
                                const noteStyle = isToday ? 'text-emerald-600' : (isDone ? 'text-slate-300 italic' : 'text-slate-500');
                                return `<tr class="${rowBgClass}">
                                    <td class="col-id">#${item.id}</td>
                                    <td class="col-status"><span class="label ${labelClass}">${labelText}</span></td>
                                    <td class="col-owner ${managerStyle}">${item.owner || '-'}</td>
                                    <td class="col-title ${titleStyle}">${item.title}</td>
                                    <td class="col-note ${noteStyle}">${item.note || '-'}</td>
                                    <td class="col-prog">
                                        <div style="display: flex; align-items: center; justify-content: flex-end; padding-right: 5px;">
                                            <div class="prog-container"><div class="prog-fill ${barColor}" style="width: ${item.progress}%"></div></div>
                                            <span style="font-size: 11px; font-weight: 800; width: 32px; text-align: right; color: ${isDone?'#94a3b8':'#0f172a'}">${item.progress}%</span>
                                        </div>
                                    </td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>`;
            });
            document.getElementById('total-percent').innerText = Math.round(totalProg / roadmapData.length) + '%';
            document.getElementById('stat-done').innerText = countDone;
            document.getElementById('stat-ing').innerText = countIng;
            document.getElementById('stat-today-count').innerText = countToday;
            document.getElementById('stat-total').innerText = roadmapData.length;
        }

        function renderAdmin() {
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = roadmapData.map((item, idx) => `
                <div class="flex items-center gap-3 bg-slate-50 p-2.5 rounded-lg border border-slate-100 shadow-sm">
                    <span class="font-mono text-[10px] text-slate-300 w-6">#${item.id}</span>
                    <div class="flex-1 min-w-0">
                        <div class="text-[11px] font-bold text-slate-800 truncate mb-1">${item.title}</div>
                        <input type="text" value="${item.note}" onchange="window.updateVal(${idx}, 'note', this.value)" class="text-[10px] w-full p-1.5 border rounded bg-white outline-none" placeholder="세부 현황 수정">
                    </div>
                    <label class="flex items-center gap-1.5 text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded cursor-pointer">
                        <input type="checkbox" ${item.isToday ? 'checked' : ''} onchange="window.updateVal(${idx}, 'isToday', this.checked)">금일</label>
                    <input type="text" value="${item.owner || ''}" onchange="window.updateVal(${idx}, 'owner', this.value)" class="text-[10px] p-1.5 border rounded bg-white w-20 outline-none" placeholder="담당자 수정">
                    <div class="flex items-center gap-2">
                        <input type="range" min="0" max="100" step="5" value="${item.progress}" onchange="window.updateVal(${idx}, 'progress', this.value)" class="w-20">
                        <span class="text-[10px] font-black w-6 text-blue-600">${item.progress}%</span>
                    </div>
                    <select onchange="window.updateVal(${idx}, 'status', this.value)" class="text-[10px] font-bold p-1.5 border rounded bg-white w-16 outline-none">
                        <option value="PENDING" ${item.status === 'PENDING' ? 'selected' : ''}>대기</option>
                        <option value="ING" ${item.status === 'ING' ? 'selected' : ''}>진행</option>
                        <option value="DONE" ${item.status === 'DONE' ? 'selected' : ''}>완료</option>
                    </select>
                </div>`).join('');
        }

        window.updateVal = function(idx, key, val) {
            roadmapData[idx][key] = (key === 'progress') ? parseInt(val) : val;
            if (isCloudReady) saveToFirestore(); else updateUI();
        }

        window.toggleAdmin = function() { document.getElementById('admin-panel').classList.toggle('hidden'); }

        window.downloadUpdatedHTML = function() {
            try {
                const clone = document.documentElement.cloneNode(true);
                clone.querySelector('#report-content').innerHTML = '';
                clone.querySelector('#admin-list').innerHTML = '';
                
                const dataScript = clone.querySelector('#data-script');
                if (dataScript) {
                    dataScript.textContent = '\n        const initialData = ' + JSON.stringify(roadmapData, null, 12) + ';\n    ';
                }

                const updatedSource = "<!DOCTYPE html>\n" + clone.outerHTML;
                const blob = new Blob([updatedSource], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                
                a.href = url;
                a.download = `LONGRISE_REPORT_LIVE_V1_${dateStr}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast("수정 사항이 박제된 HTML 파일이 다운로드되었습니다.");
            } catch (error) {
                console.error(error);
                showToast("파일 생성 중 오류가 발생했습니다.");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 3000);
        }

        window.onload = startApp;
    </script>

</body></html>
