        const ProfilePage = ({ user, setShowDistributorModal, setDistributorAgreed, setUser, showDistributorModal }) => {
            const [toastMessage, setToastMessage] = useState(null);
            const [distributorAgreed, setLocalDistributorAgreed] = useState(false);
            const [isEditingNickname, setIsEditingNickname] = useState(false);
            const [nicknameDraft, setNicknameDraft] = useState('GoldenDragon');
            const [currentNickname, setCurrentNickname] = useState('GoldenDragon');
            const [lastNicknameChange, setLastNicknameChange] = useState(null);
            const [kyc, setKyc] = useState({
                mobileModal: false, mobileStep: 0, mobilePhone: '', mobileOtp: '',
                otpModal: false, otpStep: 0, otpSecret: '', otpCode: '',
                faceModal: false, faceStep: 0, faceComplete: false
            });
            const [connectedWallets, setConnectedWallets] = useState({
                phantom: false, metamask: false, trustwallet: false
            });
            const [profileImage, setProfileImage] = useState(null);
            const profileImageRef = useRef(null);
            const handleProfileImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setProfileImage(event.target.result);
                        showToast('Profile image updated!');
                    };
                    reader.readAsDataURL(file);
                }
            };
            const handleSaveNickname = () => {
                if (nicknameDraft.trim().length === 0) { showToast('Nickname cannot be empty'); return; }
                if (nicknameDraft.length > 20) { showToast('Nickname must be 20 characters or less'); return; }
                
                const now = new Date();
                const lastChange = lastNicknameChange ? new Date(lastNicknameChange) : null;
                
                if (lastChange) {
                    const daysDiff = Math.floor((now - lastChange) / (1000 * 60 * 60 * 24));
                    if (daysDiff < 7) {
                        const daysLeft = 7 - daysDiff;
                        showToast(`닉네임은 일주일에 한번 변경 가능합니다 (${daysLeft}일 남음)`);
                        return;
                    }
                }
                
                setCurrentNickname(nicknameDraft);
                setLastNicknameChange(now.toISOString());
                setIsEditingNickname(false);
                showToast('✅ 닉네임이 변경되었습니다!');
            };
            const handleCancelNickname = () => {
                setNicknameDraft(currentNickname);
                setIsEditingNickname(false);
            };
            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };
            const generateDistributorCode = () => {
                const timestamp = Date.now().toString().slice(-5);
                return `DIST_${user.name}_${timestamp}`;
            };
            const handleDistributorApply = () => {
                if (!distributorAgreed) { showToast('Please agree to the terms and conditions'); return; }
                setUser(prev => ({ ...prev, distributorStatus: 'pending', distributorCode: null }));
                setShowDistributorModal(false);
                setLocalDistributorAgreed(false);
                showToast('✅ Application submitted! Pending approval...');
            };
            const handleMobileVerification = () => {
                if (kyc.mobileStep === 0) {
                    if (!kyc.mobilePhone) { showToast('Please enter phone number'); return; }
                    setKyc(prev => ({ ...prev, mobileStep: 1 }));
                    showToast('OTP sent to ' + kyc.mobilePhone);
                } else if (kyc.mobileStep === 1) {
                    if (!kyc.mobileOtp || kyc.mobileOtp.length !== 6) { showToast('Please enter 6-digit OTP'); return; }
                    setUser(prev => ({ ...prev, kycItems: prev.kycItems.map((item, i) => i === 0 ? {...item, completed: true, date: new Date().toLocaleDateString()} : item) }));
                    setKyc(prev => ({ ...prev, mobileModal: false, mobileStep: 0, mobilePhone: '', mobileOtp: '' }));
                    showToast('✅ Mobile Verification completed!');}
            };
            const handleOtpVerification = () => {
                if (kyc.otpStep === 0) {
                    setKyc(prev => ({ ...prev, otpStep: 1, otpSecret: 'JBSWY3DPEBLW64TMMQ======' }));
                    showToast('Scan QR code with Google Authenticator');
                } else if (kyc.otpStep === 1) {
                    if (!kyc.otpCode || kyc.otpCode.length !== 6) { showToast('Please enter 6-digit code'); return; }
                    setUser(prev => ({ ...prev, kycItems: prev.kycItems.map((item, i) => i === 1 ? {...item, completed: true, date: new Date().toLocaleDateString()} : item) }));
                    setKyc(prev => ({ ...prev, otpModal: false, otpStep: 0, otpSecret: '', otpCode: '' }));
                    showToast('✅ OTP Verification completed!');
                }
            };
            const handleFaceIdVerification = () => {
                if (kyc.faceStep === 0) {
                    setKyc(prev => ({ ...prev, faceStep: 1 }));
                    showToast('Starting face recognition...');
                    setTimeout(() => {
                        setUser(prev => ({ ...prev, kycItems: prev.kycItems.map((item, i) => i === 2 ? {...item, completed: true, date: new Date().toLocaleDateString()} : item) }));
                        setKyc(prev => ({ ...prev, faceModal: false, faceStep: 0, faceComplete: true }));
                        showToast('✅ Face ID Verification completed!');
                    }, 2000);
                }
            };
            const handleWalletConnect = (wallet) => {
                setConnectedWallets(prev => ({ ...prev, [wallet]: !prev[wallet] }));
                showToast(`${wallet.charAt(0).toUpperCase() + wallet.slice(1)} ${connectedWallets[wallet] ? 'disconnected' : 'connected'}!`);
            };

            return (
                <div className="pt-28 pb-24 px-4 max-w-6xl mx-auto min-h-screen relative z-20 overflow-hidden">
                    <div className="fixed inset-0 bg-gradient-to-br from-[#2d0808] to-black -z-10"></div>
                    <div className="fixed inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10 -z-10"></div>
                <SectionHeader title="My Profile" subtitle="Premium Member Dashboard" theme="gold" />
                
                {/* ============ 프로필 섹션 (위) ============ */}
                <div className="rounded-2xl p-6 relative overflow-hidden bg-gradient-to-br from-blue-950/60 to-blue-900/30 border-2 border-blue-500/50 shadow-xl mb-6">
                    <div className="relative z-10">

                                    alt="Profile"
                                    className="w-14 h-14 lg:w-16 lg:h-16 rounded-xl shadow-[0_0_20px_rgba(212,175,55,0.4)] border-2 border-blue-500/50 flex-shrink-0 cursor-pointer object-cover"
                                    onClick={() => profileImageRef.current?.click()}
                                />
                                <div className="absolute inset-0 rounded-xl bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center cursor-pointer" onClick={() => profileImageRef.current?.click()}>

                                    </svg>
                                </div>
                                <input
                                    ref={profileImageRef}
                                    type="file"
                                    accept="image/*"
                                    onChange={handleProfileImageChange}
                                    className="hidden"
                                />
                            </div>
                            <div className="flex-1 min-w-0">
                                {/* 닉네임 - 연필 아이콘으로 편집 */}
                                {!isEditingNickname ? (
                                    <div className="flex items-center gap-2 group">
                                        <h3 className="text-2xl lg:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 truncate">
                                            {currentNickname}

                                        <button
                                            onClick={() => { setNicknameDraft(currentNickname); setIsEditingNickname(true); }}

                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                            </svg>

                                    </div>
                                ) : (
                                    <div className="flex gap-2 items-center">
                                        <input
                                            value={nicknameDraft}
                                            onChange={(e) => setNicknameDraft(e.target.value.slice(0, 20))}

                                            className="px-2 py-1 bg-[#0a0e27] border-2 border-yellow-500 rounded-lg text-white font-black text-sm placeholder-gray-600 focus:outline-none"

                                        <button

                                        >

                                        >
                                            Cancel

                                    </div>
                                )}
                                <p className="text-xs text-gray-400 mt-2">Member Profile</p>

                            </div>
                        </div>
                    </div>
                </div>

                {/* ============ 정보 카드 섹션 (4칼럼 그리드 - 아래) ============ */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    {/* Rank 카드 */}
                    <div className="rounded-2xl p-4 relative overflow-hidden bg-gradient-to-br from-blue-950/60 to-blue-900/30 border-2 border-blue-500/50 shadow-xl flex flex-col justify-center">
                        <div className="relative z-10 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" className="w-5 h-5 text-blue-400 mx-auto mb-1"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            <p className="text-xs text-blue-300 uppercase tracking-widest font-bold">Rank</p>
                            <p className="text-sm lg:text-base font-black text-blue-200 mt-1">{user.rank}</p>
                        </div>
                    </div>

                    {/* Package 카드 */}
                    <div className="rounded-2xl p-4 relative overflow-hidden bg-gradient-to-br from-yellow-950/60 to-yellow-900/30 border-2 border-yellow-500/50 shadow-xl flex flex-col justify-center">
                        <div className="relative z-10 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5 text-yellow-400 mx-auto mb-1"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m8-1a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <p className="text-xs text-yellow-300 uppercase tracking-widest font-bold">Package</p>
                            <p className="text-sm lg:text-base font-black text-yellow-200 mt-1">{user.package}</p>

                    </div>

                    {/* Type 카드 */}
                    <div className="rounded-2xl p-4 relative overflow-hidden bg-gradient-to-br from-cyan-950/60 to-cyan-900/30 border-2 border-cyan-500/50 shadow-xl flex flex-col justify-center">

                                    <p className="text-xs text-red-300 uppercase tracking-widest font-bold">Distributor</p>

                            {user.distributorStatus === 'pending' && (
                                <>
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5 text-orange-400 mx-auto mb-1"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    <p className="text-xs text-orange-300 uppercase tracking-widest font-bold">Distributor</p>
                                    <p className="text-xs text-orange-400 font-bold mt-1">Pending</p>
                                </>
                            )}
                            {user.distributorStatus === 'approved' && (
                                <>
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5 text-green-400 mx-auto mb-1"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    <p className="text-xs text-green-300 uppercase tracking-widest font-bold">Distributor</p>
                                    <p className="text-xs text-green-400 font-bold mt-1">Active</p>
                                </>
                            )}
                        </div>
                    </div>
                </div>

                {/* ============ TIER 1: 자산 관리 (좌) + 보안 센터 (우) ============ */}
