<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Core Generative Animation</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0f0202; /* 심해/우주 느낌의 다크 레드 배경 */
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

<canvas id="brainCanvas"></canvas>

<script>
  const canvas = document.getElementById('brainCanvas');
  const ctx = canvas.getContext('2d');

  let width, height, cx, cy;
  let particles = [];
  let bgLines = [];
  const numParticles = 400; // 노드 개수
  const connectionDistance = 60; // 선이 연결되는 최대 거리

  // 캔버스 사이즈 초기화
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
    initParticles();
    initBgLines();
  }

  window.addEventListener('resize', resize);

  // 파티클(노드) 객체 정의
  class Particle {
    constructor(x, y) {
      this.baseX = x;
      this.baseY = y;
      this.x = x;
      this.y = y;
      // 무작위 이동 속도
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
      this.size = Math.random() * 1.5 + 0.5;
      this.angle = Math.random() * Math.PI * 2;
      this.speed = Math.random() * 0.02 + 0.01;
    }

    update() {
      // 미세하게 진동 및 회전하는 움직임
      this.angle += this.speed;
      this.x = this.baseX + Math.cos(this.angle) * 3;
      this.y = this.baseY + Math.sin(this.angle) * 3;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = '#ff3b3b';
      ctx.fill();
    }
  }

  // 뇌 형태를 구성하는 파티클 생성 로직
  function initParticles() {
    particles = [];
    const radiusX = Math.min(width * 0.2, 150);
    const radiusY = Math.min(height * 0.3, 200);
    const offset = radiusX * 0.8; // 좌우 반구 간격

    const halfParticles = Math.floor(numParticles / 2);

    // 좌우 완벽한 대칭을 위해 1회 루프 시 좌/우 한 쌍의 노드를 동시에 생성
    for (let i = 0; i < halfParticles; i++) {
      let angle = Math.random() * Math.PI * 2;
      // 중앙에 더 밀집되도록 sqrt 사용
      let r = Math.sqrt(Math.random()); 
      
      let localX = Math.cos(angle) * radiusX * r;
      let localY = Math.sin(angle) * radiusY * r;

      // 중앙 틈(시냅스 갭) 만들기: 중앙 중심축(cx)에 너무 가까운 점은 제외
      if (offset + localX < offset * 0.2) continue;

      // 우측 반구 파티클
      particles.push(new Particle(cx + offset + localX, cy + localY));
      // 좌측 반구 파티클 (X축을 반전시켜 완벽한 대칭 형성)
      particles.push(new Particle(cx - offset - localX, cy + localY));
    }
  }

  // 배경 데이터 스트림(가로선) 생성
  function initBgLines() {
    bgLines = [];
    for (let i = 0; i < 20; i++) {
      bgLines.push({
        y: Math.random() * height,
        speed: (Math.random() + 0.5) * 2,
        length: Math.random() * 200 + 50,
        x: Math.random() * width
      });
    }
  }

  // 메인 애니메이션 루프
  function animate() {
    // 잔상 효과를 위한 반투명 배경 덧칠
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(15, 2, 2, 0.2)'; 
    ctx.fillRect(0, 0, width, height);

    // 빛이 겹치면 밝아지는 가산 혼합 모드 활성화
    ctx.globalCompositeOperation = 'lighter';

    // 1. 배경 가로선(데이터 흐름) 그리기
    ctx.lineWidth = 1;
    bgLines.forEach(line => {
      line.x += line.speed;
      if (line.x > width) line.x = -line.length;
      
      const gradient = ctx.createLinearGradient(line.x, line.y, line.x + line.length, line.y);
      gradient.addColorStop(0, 'rgba(255, 59, 59, 0)');
      gradient.addColorStop(0.5, 'rgba(255, 59, 59, 0.3)');
      gradient.addColorStop(1, 'rgba(255, 59, 59, 0)');
      
      ctx.strokeStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(line.x, line.y);
      ctx.lineTo(line.x + line.length, line.y);
      ctx.stroke();
    });

    // 2. 파티클 업데이트 및 연결선 렌더링
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();

      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // 거리가 가까운 노드끼리 선으로 연결 (거리에 따라 투명도 조절)
        if (dist < connectionDistance) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(255, 59, 59, ${1 - dist / connectionDistance})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // 3. 중앙 발광선 그리기
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255, 59, 59, 0.4)';
    ctx.lineWidth = 2;
    ctx.moveTo(cx - 200, cy);
    ctx.lineTo(cx + 200, cy);
    ctx.stroke();

    // 4. 중앙 "LONGRISE AI" 텍스트 2열 렌더링
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // 텍스트 글로우 효과
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff';

    // 1열: LONGRISE
    ctx.font = 'bold 36px Arial, sans-serif';
    ctx.fillText('LONGRISE', cx, cy - 20);
    
    // 2열: AI
    ctx.font = 'bold 52px Arial, sans-serif';
    ctx.fillText('AI', cx, cy + 30);
    
    // 성능을 위해 shadow 초기화
    ctx.shadowBlur = 0; 

    requestAnimationFrame(animate);
  }

  // 초기화 및 실행
  window.onload = () => {
    resize();
    animate();
  };
</script>

</body>
</html>
