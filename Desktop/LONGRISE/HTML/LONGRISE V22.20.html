        const NetworkOverlay = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                let animationFrameId;
                let particles = [];
                const particleCount = window.innerWidth < 768 ? 30 : 60;
                const connectionDistance = 150;
                const resize = () => { if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } };
                
                class Particle {
                    constructor() { this.init(); }
                    init() {
                        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                        this.vx = (Math.random() - 0.5) * 0.2; this.vy = (Math.random() - 0.5) * 0.2;
                        this.radius = Math.random() * 1.5 + 0.5;
                        const colors = ['rgba(234, 179, 8, 0.6)', 'rgba(220, 38, 38, 0.5)', 'rgba(255, 255, 255, 0.3)'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        this.glow = Math.random() * Math.PI * 2; this.glowSpeed = 0.02 + Math.random() * 0.03;
                    }
                    update() {
                        this.x += this.vx; this.y += this.vy;
                        if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                        this.glow += this.glowSpeed;
                    }
                    draw() {
                        ctx.beginPath();
                        const currentRadius = this.radius + Math.sin(this.glow) * 0.5;
                        ctx.arc(this.x, this.y, Math.max(0, currentRadius), 0, Math.PI * 2);
                        ctx.fillStyle = this.color; 
                        ctx.fill(); 
                    }
                }
                const initParticles = () => { particles = []; for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); } };
                const drawLines = () => {
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < connectionDistance) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                                const opacity = (1 - dist / connectionDistance) * 0.15;
                                ctx.strokeStyle = `rgba(234, 179, 8, ${opacity})`; ctx.lineWidth = 0.5; ctx.stroke();
                            }
                        }
                    }
                };
                const animate = () => { if (!canvas) return; ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); drawLines(); animationFrameId = requestAnimationFrame(animate); };
                window.addEventListener('resize', resize); resize(); initParticles(); animate();
                return () => { window.removeEventListener('resize', resize); if (animationFrameId) cancelAnimationFrame(animationFrameId); };

        const CNYTPriceChart = () => {
             const [filter, setFilter] = useState('ANNUAL');
             const chartContainerRef = useRef(null);
             const [dimensions, setDimensions] = useState({ width: 0, height: 0 });
             const [hoverIndex, setHoverIndex] = useState(null);
             
             useEffect(() => {
                 const handleResize = () => { if (chartContainerRef.current) { setDimensions({ width: chartContainerRef.current.clientWidth, height: chartContainerRef.current.clientHeight }); } };
                 handleResize();
                 window.addEventListener('resize', handleResize);
                 return () => window.removeEventListener('resize', handleResize);
             }, []);

             const annualData = [ 
                {val: 0.100, label: 'JAN'}, {val: 0.108, label: 'FEB'}, {val: 0.115, label: 'MAR'}, 
                {val: 0.230, label: 'APR'}, {val: 0.225, label: 'MAY'}, {val: 0.245, label: 'JUN'}, 
                {val: 0.250, label: 'JUL'}, {val: 0.380, label: 'AUG'}, {val: 0.365, label: 'SEP'}, 
                {val: 0.420, label: 'OCT'}, {val: 0.450, label: 'NOV'}, {val: 0.500, label: 'DEC'} 
             ];
             const quarterData = [ {val: 0.10, label: 'Q1'}, {val: 0.25, label: 'Q2'}, {val: 0.38, label: 'Q3'}, {val: 0.50, label: 'Q4'} ];
             const monthData = [ {val: 0.41, label: 'Week 1'}, {val: 0.42, label: 'Week 2'}, {val: 0.47, label: 'Week 3'}, {val: 0.50, label: 'Week 4'} ];
             
             const rawData = filter === 'ANNUAL' ? annualData : filter === 'QUARTER' ? quarterData : monthData;
             const startVal = rawData[0].val.toFixed(2);
             const startLabel = filter === 'MONTH' ? 'Month Start' : filter === 'QUARTER' ? 'Start Q1' : 'Start Price';
             
             const { width, height } = dimensions;
             const padding = { top: 160, bottom: 120, left: 60, right: 60 }; 
             const graphWidth = width - padding.left - padding.right;
             const graphHeight = height - padding.top - padding.bottom;

             const vals = rawData.map(d => d.val);
             const maxVal = Math.max(...vals);
             const minVal = Math.min(...vals);
             const valRange = maxVal - minVal || 1;

             const getX = (index) => padding.left + (index / (rawData.length - 1)) * graphWidth;
             const getY = (val) => padding.top + graphHeight - ((val - minVal) / valRange) * graphHeight;

             const jaggedPathData = useMemo(() => {
                 if (rawData.length === 0 || width === 0) return { path: "", area: "" };
                 let seed = 42;
                 const random = () => { const x = Math.sin(seed++) * 10000; return x - Math.floor(x); };
                 let path = `M ${getX(0)},${getY(rawData[0].val)}`;
                 const stepsPerSegment = filter === 'ANNUAL' ? 20 : filter === 'QUARTER' ? 40 : 30;
                 for (let i = 0; i < rawData.length - 1; i++) {
                     const startX = getX(i); const startY = rawData[i].val;
                     const endX = getX(i + 1); const endY = rawData[i+1].val;
                     for (let j = 1; j <= stepsPerSegment; j++) {
                         const rawT = j / stepsPerSegment;
                         const t = rawT < 0.5 ? 2 * rawT * rawT : -1 + (4 - 2 * rawT) * rawT;
                         const currentX = startX + (endX - startX) * rawT;
                         const baseVal = startY + (endY - startY) * t;
                         let noise = 0;
                         if (j < stepsPerSegment) { 
                             const slope = Math.abs(endY - startY);
                             const volatility = slope * 0.15 + (valRange * 0.02); 
                             noise = (random() - 0.5) * volatility + (Math.sin(rawT * Math.PI * 6) * volatility * 0.2);
                         }
                         const currentY = getY(baseVal + noise);
                         path += ` L ${currentX},${currentY}`;
                     }
                 }
