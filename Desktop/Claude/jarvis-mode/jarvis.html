<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAKE — Jarvis Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00c8ff;
    --primary-dim: #0077b6;
    --accent: #7b2fff;
    --bg: #050c1a;
    --panel: rgba(0, 20, 50, 0.7);
    --text: #cce8ff;
    --text-dim: #4a7a9b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── 배경 그리드 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── 상단 헤더 ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,200,255,0.1);
    background: rgba(5,12,26,0.8);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--primary);
    text-shadow: 0 0 20px rgba(0,200,255,0.6);
  }

  .logo span { color: rgba(255,255,255,0.4); font-weight: 300; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── 메인 오브 영역 ── */
  .orb-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 40px;
  }

  /* 동심원 링 */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,200,255,0.15);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .ring-1 { width: 280px; height: 280px; }
  .ring-2 { width: 220px; height: 220px; border-color: rgba(0,200,255,0.2); }
  .ring-3 { width: 160px; height: 160px; border-color: rgba(0,200,255,0.3); }

  .ring.pulse { animation: ring-pulse 2s ease-out infinite; }
  .ring.pulse:nth-child(2) { animation-delay: 0.4s; }
  .ring.pulse:nth-child(3) { animation-delay: 0.8s; }

  @keyframes ring-pulse {
    0% { transform: translate(-50%,-50%) scale(1); opacity: 0.3; }
    100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
  }

  /* 스캔 링 (회전) */
  .scan-ring {
    position: absolute;
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top: 1px solid var(--primary);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: spin 4s linear infinite;
    opacity: 0.5;
  }

  .scan-ring-2 {
    width: 200px; height: 200px;
    border-top-color: var(--accent);
    animation: spin 6s linear infinite reverse;
  }

  @keyframes spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* 중앙 오브 */
  .orb {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle at 35% 35%, #3ae, #006 70%, #003);
    box-shadow:
      0 0 30px rgba(0,200,255,0.4),
      0 0 60px rgba(0,100,200,0.2),
      inset 0 0 20px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
  }

  .orb::after {
    content: '';
    position: absolute;
    width: 35px; height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    top: 20%; left: 20%;
  }

  /* 오브 상태 */
  body.listening .orb {
    background: radial-gradient(circle at 35% 35%, #0f8, #060 70%, #030);
    box-shadow: 0 0 40px rgba(0,255,136,0.5), 0 0 80px rgba(0,200,100,0.3);
    animation: orb-pulse 0.8s ease-in-out infinite;
  }

  body.speaking .orb {
    background: radial-gradient(circle at 35% 35%, #a6f, #406 70%, #203);
    box-shadow: 0 0 40px rgba(160,100,255,0.5), 0 0 80px rgba(120,60,200,0.3);
    animation: orb-pulse 0.5s ease-in-out infinite;
  }

  body.processing .orb {
    background: radial-gradient(circle at 35% 35%, #fa0, #840 70%, #420);
    box-shadow: 0 0 40px rgba(255,170,0,0.5), 0 0 80px rgba(200,130,0,0.3);
  }

  @keyframes orb-pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1); }
    50% { transform: translate(-50%,-50%) scale(1.08); }
  }

  /* ── 상태 텍스트 ── */
  .status-text {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 30px;
    transition: color 0.3s;
  }

  body.listening .status-text { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
  body.speaking .status-text { color: #a06bff; text-shadow: 0 0 10px #a06bff; }
  body.processing .status-text { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }

  /* ── 파형 Canvas ── */
  .waveform-container {
    width: 600px;
    height: 80px;
    margin-bottom: 30px;
    position: relative;
  }

  #waveformCanvas {
    width: 100%;
    height: 100%;
  }

  /* ── 자막 영역 ── */
  .subtitle-area {
    width: 700px;
    min-height: 100px;
    padding: 20px 30px;
    background: var(--panel);
    border: 1px solid rgba(0,200,255,0.15);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .subtitle-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    animation: scan-line 3s ease-in-out infinite;
  }

  @keyframes scan-line {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .subtitle-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  #subtitleText {
    font-size: 18px;
    line-height: 1.6;
    color: var(--text);
    min-height: 30px;
  }

  #interimText {
    font-size: 16px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 8px;
    min-height: 24px;
  }

  /* ── 대화 로그 ── */
  .conversation-log {
    position: fixed;
    right: 30px;
    top: 80px;
    bottom: 120px;
    width: 320px;
    background: var(--panel);
    border: 1px solid rgba(0,200,255,0.1);
    border-radius: 8px;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .conversation-log::-webkit-scrollbar { width: 3px; }
  .conversation-log::-webkit-scrollbar-thumb { background: var(--primary-dim); border-radius: 2px; }

  .log-header {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,200,255,0.1);
    position: sticky;
    top: -16px;
    background: var(--panel);
    margin: -16px -16px 0 -16px;
    padding: 12px 16px;
  }

  .log-entry {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry .who {
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .log-entry.user .who { color: #00ff88; }
  .log-entry.jake .who { color: var(--primary); }

  .log-entry .content {
    font-size: 13px;
    line-height: 1.5;
    color: rgba(200, 232, 255, 0.7);
    padding-left: 8px;
    border-left: 2px solid rgba(0,200,255,0.2);
  }

  /* ── 하단 컨트롤 ── */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    background: rgba(5,12,26,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0,200,255,0.1);
  }

  .btn {
    padding: 12px 28px;
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    background: rgba(0,200,255,0.1);
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(0,200,255,0.2);
  }

  .btn-primary {
    background: rgba(0,100,200,0.2);
    border-color: var(--primary);
    color: var(--primary);
  }

  .btn-primary:hover {
    background: rgba(0,200,255,0.2);
    box-shadow: 0 0 20px rgba(0,200,255,0.3);
  }

  .btn-danger {
    border-color: rgba(255,80,80,0.3);
    color: rgba(255,120,120,0.8);
  }

  .btn-danger:hover {
    background: rgba(255,80,80,0.1);
    border-color: rgba(255,80,80,0.6);
  }

  .wake-hint {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  /* ── 연결 상태 패널 (좌측) ── */
  .connection-panel {
    position: fixed;
    left: 30px;
    top: 80px;
    width: 220px;
    background: var(--panel);
    border: 1px solid rgba(0,200,255,0.1);
    border-radius: 8px;
    padding: 16px;
  }

  .conn-header {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .conn-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--text);
  }

  .conn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }

  .conn-dot.ok { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .conn-dot.error { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
  .conn-dot.checking { background: #ffaa00; animation: blink 1s infinite; }

  .conn-label { color: var(--text-dim); font-size: 10px; letter-spacing: 1px; }

  /* ── 타이핑 커서 ── */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: var(--primary);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: cursor-blink 1s step-end infinite;
  }

  @keyframes cursor-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body id="mainBody">

<!-- 헤더 -->
<div class="header">
  <div class="logo">JAKE <span>// AI ORCHESTRATOR</span></div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span id="headerStatus">STANDBY</span>
    <span style="color:rgba(0,200,255,0.2)">|</span>
    <span id="timeDisplay"></span>
  </div>
</div>

<!-- 연결 상태 패널 -->
<div class="connection-panel">
  <div class="conn-header">SYSTEM STATUS</div>
  <div class="conn-item">
    <div class="conn-dot checking" id="dot-api"></div>
    <div>
      <div>JAKE API</div>
      <div class="conn-label">localhost:8000</div>
    </div>
  </div>
  <div class="conn-item">
    <div class="conn-dot checking" id="dot-speech"></div>
    <div>
      <div>SPEECH ENGINE</div>
      <div class="conn-label">Web Speech API</div>
    </div>
  </div>
  <div class="conn-item">
    <div class="conn-dot checking" id="dot-tts"></div>
    <div>
      <div>TTS ENGINE</div>
      <div class="conn-label">Speech Synthesis</div>
    </div>
  </div>
  <div style="margin-top:16px; padding-top:16px; border-top:1px solid rgba(0,200,255,0.1);">
    <div class="conn-label" style="margin-bottom:6px;">VOICE</div>
    <select id="voiceSelect" style="width:100%; background:#0a1628; color:var(--text); border:1px solid rgba(0,200,255,0.2); border-radius:4px; padding:6px 8px; font-size:11px; cursor:pointer;">
      <option value="">로딩 중...</option>
    </select>
  </div>
  <div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(0,200,255,0.1);">
    <div class="conn-label" style="margin-bottom:6px;">WAKE WORD</div>
    <div style="font-size:13px; color:var(--primary);">"헤이 제이크"</div>
    <div style="font-size:11px; color:var(--text-dim); margin-top:2px;">"Hey Jake"</div>
  </div>
</div>

<!-- 메인 오브 -->
<div class="orb-container">
  <div class="ring ring-1 pulse"></div>
  <div class="ring ring-2 pulse"></div>
  <div class="ring ring-3 pulse"></div>
  <div class="scan-ring"></div>
  <div class="scan-ring scan-ring-2"></div>
  <div class="orb" id="orb"></div>
</div>

<!-- 상태 텍스트 -->
<div class="status-text" id="statusText">STANDBY — SAY "헤이 제이크" TO ACTIVATE</div>

<!-- 파형 -->
<div class="waveform-container">
  <canvas id="waveformCanvas"></canvas>
</div>

<!-- 자막 -->
<div class="subtitle-area">
  <div class="subtitle-label">LIVE TRANSCRIPT</div>
  <div id="subtitleText">—</div>
  <div id="interimText"></div>
</div>

<!-- 대화 로그 -->
<div class="conversation-log" id="convLog">
  <div class="log-header">CONVERSATION LOG</div>
</div>

<!-- 컨트롤 -->
<div class="controls">
  <span class="wake-hint">자동 웨이크워드 감지 중</span>
  <button class="btn btn-primary" id="btnListen" onclick="manualListen()">MANUAL LISTEN</button>
  <button class="btn" onclick="toggleWakeWord()" id="btnWake">WAKE WORD: ON</button>
  <button class="btn btn-danger" onclick="stopAll()">STOP</button>
</div>

<script>
// ── 설정 ──
const JAKE_API = 'http://localhost:8000/chat';
const WAKE_WORDS = ['헤이 제이크', '헤이제이크', 'hey jake', 'hey j', '제이크야', '제이크'];
const JAKE_NAME = 'Jake';

// ── 상태 ──
let state = 'standby'; // standby | wake-listening | processing | speaking
let wakeWordEnabled = true;
let recognition = null;
let synthesis = window.speechSynthesis;
let waveAnimId = null;
let waveMode = 'idle'; // idle | listening | speaking
let waveData = new Array(40).fill(0);

// ── 시계 ──
function updateTime() {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toLocaleTimeString('ko-KR', { hour12: false });
}
setInterval(updateTime, 1000);
updateTime();

// ── 파형 애니메이션 ──
const canvas = document.getElementById('waveformCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawWaveform() {
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  const barCount = 40;
  const barW = 6;
  const gap = (w - barCount * barW) / (barCount + 1);
  const centerY = h / 2;

  // 타겟 높이 결정
  let targets = waveData.map((v, i) => {
    if (waveMode === 'idle') {
      return 3 + Math.sin(Date.now() / 800 + i * 0.4) * 2;
    } else if (waveMode === 'listening') {
      return 10 + Math.random() * 30 + Math.sin(Date.now() / 200 + i * 0.5) * 15;
    } else if (waveMode === 'speaking') {
      return 8 + Math.sin(Date.now() / 150 + i * 0.8) * 25 + Math.random() * 10;
    } else if (waveMode === 'processing') {
      const phase = (Date.now() / 300 + i * 0.3) % (Math.PI * 2);
      return 5 + Math.abs(Math.sin(phase)) * 20;
    }
    return 3;
  });

  waveData = waveData.map((v, i) => v + (targets[i] - v) * 0.3);

  for (let i = 0; i < barCount; i++) {
    const x = gap + i * (barW + gap);
    const h_bar = Math.max(3, waveData[i]);

    // 색상
    let color;
    if (waveMode === 'listening') color = '#00ff88';
    else if (waveMode === 'speaking') color = '#a06bff';
    else if (waveMode === 'processing') color = '#ffaa00';
    else color = '#0077b6';

    // 그라디언트
    const grad = ctx.createLinearGradient(x, centerY - h_bar, x, centerY + h_bar);
    grad.addColorStop(0, color + 'aa');
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, color + 'aa');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, centerY - h_bar, barW, h_bar * 2, 3);
    ctx.fill();
  }

  waveAnimId = requestAnimationFrame(drawWaveform);
}
drawWaveform();

// ── 시스템 상태 전환 ──
function setState(newState, statusMsg) {
  state = newState;
  const body = document.getElementById('mainBody');
  body.className = '';
  if (newState !== 'standby') body.classList.add(newState === 'wake-listening' ? 'listening' : newState);

  const statusEl = document.getElementById('statusText');
  const headerEl = document.getElementById('headerStatus');
  statusEl.textContent = statusMsg;
  headerEl.textContent = newState.toUpperCase().replace('-', ' ');

  if (newState === 'standby') waveMode = 'idle';
  else if (newState === 'wake-listening') waveMode = 'listening';
  else if (newState === 'processing') waveMode = 'processing';
  else if (newState === 'speaking') waveMode = 'speaking';
}

// ── 자막 업데이트 ──
let typewriterTimeout = null;
function showSubtitle(text, isJake = false) {
  const el = document.getElementById('subtitleText');
  el.innerHTML = '';
  clearTimeout(typewriterTimeout);

  if (!isJake) {
    el.textContent = text;
    return;
  }

  // Jake 응답: 타이핑 효과
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  function type() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      el.appendChild(cursor);
      i++;
      typewriterTimeout = setTimeout(type, 30);
    } else {
      cursor.remove();
    }
  }
  type();
}

function showInterim(text) {
  document.getElementById('interimText').textContent = text ? `[ ${text} ]` : '';
}

// ── 대화 로그 ──
function addToLog(who, text) {
  const log = document.getElementById('convLog');
  const entry = document.createElement('div');
  entry.className = `log-entry ${who === '나' ? 'user' : 'jake'}`;
  entry.innerHTML = `
    <div class="who">${who === '나' ? 'YOU' : 'JAKE'}</div>
    <div class="content">${text}</div>
  `;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

// ── 연결 확인 ──
async function checkConnections() {
  // API 확인
  try {
    const r = await fetch('http://localhost:8000/health', { signal: AbortSignal.timeout(3000) });
    const data = await r.json();
    document.getElementById('dot-api').className = 'conn-dot ok';
  } catch {
    document.getElementById('dot-api').className = 'conn-dot error';
  }

  // Speech API 확인
  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    document.getElementById('dot-speech').className = 'conn-dot ok';
  } else {
    document.getElementById('dot-speech').className = 'conn-dot error';
  }

  // TTS 확인
  if ('speechSynthesis' in window) {
    document.getElementById('dot-tts').className = 'conn-dot ok';
  } else {
    document.getElementById('dot-tts').className = 'conn-dot error';
  }
}
checkConnections();

// ── Jake API 호출 ──
async function askJake(userText) {
  setState('processing', 'PROCESSING — CONNECTING TO JAKE...');
  showSubtitle('처리 중...', false);

  try {
    const response = await fetch(JAKE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText }),
      signal: AbortSignal.timeout(30000)
    });

    if (!response.ok) throw new Error(`API Error: ${response.status}`);

    const data = await response.json();
    const jakeReply = data.response || '응답을 받지 못했습니다.';

    addToLog('나', userText);
    addToLog('jake', jakeReply);

    speakResponse(jakeReply);
  } catch (err) {
    setState('standby', `ERROR: ${err.message}`);
    showSubtitle('연결 오류가 발생했습니다.', false);
    setTimeout(() => setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE'), 3000);
  }
}

// ── TTS 텍스트 정리 ──
function cleanForTTS(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/#{1,6}\s+/g, '')
    .replace(/---+/g, '')
    .replace(/\n[-*]\s+/g, ' ')
    .replace(/\n\d+\.\s+/g, ' ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/`{1,3}[^`]*`{1,3}/g, '')
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[!]{2,}/g, '!')
    .replace(/\n+/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

let clovaAvailable = false;

// 서버 시작 시 CLOVA 사용 가능 여부 확인
fetch('/tts-status').then(r => r.json()).then(d => {
  clovaAvailable = d.clova;
  document.getElementById('dot-tts').className = `conn-dot ${clovaAvailable ? 'ok' : 'checking'}`;
  if (clovaAvailable) {
    document.querySelector('.conn-item:nth-child(3) .content, .conn-item div div:last-child') ;
  }
}).catch(() => {});

// ── CLOVA TTS ──
async function speakWithClova(text) {
  const res = await fetch('/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, speaker: 'nbora' }),
    signal: AbortSignal.timeout(10000)
  });
  if (!res.ok) throw new Error(`CLOVA ${res.status}`);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  return url;
}

// ── 브라우저 TTS 폴백 ──
function speakWithBrowser(text) {
  return new Promise((resolve) => {
    synthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (selectedVoice) {
      utter.voice = selectedVoice;
      utter.lang = selectedVoice.lang;
    } else {
      utter.lang = 'ko-KR';
    }
    utter.rate = 1.3;
    utter.pitch = 1.15;
    utter.volume = 1.0;
    utter.onend = resolve;
    utter.onerror = resolve;
    synthesis.speak(utter);
  });
}

// ── TTS 메인 ──
async function speakResponse(text) {
  setState('speaking', 'SPEAKING — JAKE IS RESPONDING');
  showSubtitle(text, true);

  const spokenText = cleanForTTS(text);

  const onDone = () => {
    setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
    if (wakeWordEnabled) startWakeWordListening();
  };

  if (clovaAvailable) {
    try {
      const audioUrl = await speakWithClova(spokenText);
      const audio = new Audio(audioUrl);
      audio.onended = () => { URL.revokeObjectURL(audioUrl); onDone(); };
      audio.onerror = () => { URL.revokeObjectURL(audioUrl); onDone(); };
      audio.play();
      return;
    } catch (e) {
      console.warn('CLOVA 실패, 브라우저 TTS로 전환:', e.message);
    }
  }

  // 폴백: 브라우저 TTS
  await speakWithBrowser(spokenText);
  onDone();
}

// ── 음성 인식 ──
let isListeningForCommand = false;

function buildRecognition(continuous, interim) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.lang = 'ko-KR';
  rec.continuous = continuous;
  rec.interimResults = interim;
  return rec;
}

// 웨이크워드 감지 모드
function startWakeWordListening() {
  if (!wakeWordEnabled || state !== 'standby') return;
  if (recognition) { recognition.stop(); recognition = null; }

  recognition = buildRecognition(true, true);
  if (!recognition) return;

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript.toLowerCase().trim();
      if (WAKE_WORDS.some(w => transcript.includes(w))) {
        recognition.stop();
        recognition = null;
        triggerCommandMode();
        return;
      }
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setTimeout(() => { if (wakeWordEnabled && state === 'standby') startWakeWordListening(); }, 1000);
    }
  };

  recognition.onend = () => {
    if (wakeWordEnabled && state === 'standby') {
      setTimeout(() => startWakeWordListening(), 500);
    }
  };

  try { recognition.start(); } catch (e) {}
}

// 명령 수신 모드
function triggerCommandMode() {
  synthesis.cancel();
  setState('wake-listening', 'LISTENING — SPEAK YOUR COMMAND');
  showSubtitle('말씀하세요...', false);
  showInterim('');

  // 활성화 음성 피드백
  if (clovaAvailable) {
    speakWithClova('네!').then(url => {
      const a = new Audio(url);
      a.onended = () => URL.revokeObjectURL(url);
      a.volume = 0.7;
      a.play();
    }).catch(() => {});
  } else {
    const voices = synthesis.getVoices();
    const koVoice = voices.find(v => v.lang === 'ko-KR' || v.lang === 'ko_KR');
    const activateUtter = new SpeechSynthesisUtterance('네!');
    activateUtter.lang = 'ko-KR';
    activateUtter.volume = 0.7;
    activateUtter.rate = 1.3;
    activateUtter.pitch = 1.15;
    if (koVoice) activateUtter.voice = koVoice;
    synthesis.speak(activateUtter);
  }

  // continuous 모드 + 침묵 감지 타이머
  recognition = buildRecognition(true, true);
  if (!recognition) return;

  let finalTranscript = '';
  let silenceTimer = null;

  const SILENCE_TIMEOUT = 2000; // 2초 침묵 → 자동 완료

  function resetSilenceTimer() {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
    }, SILENCE_TIMEOUT);
  }

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
        resetSilenceTimer(); // 말이 들어올 때마다 타이머 리셋
      } else {
        interim += e.results[i][0].transcript;
        resetSilenceTimer();
      }
    }
    showInterim(interim);
    if (finalTranscript) showSubtitle(finalTranscript, false);
  };

  recognition.onstart = () => {
    resetSilenceTimer(); // 시작 시 첫 타이머 가동
  };

  recognition.onend = () => {
    clearTimeout(silenceTimer);
    showInterim('');
    if (finalTranscript.trim()) {
      askJake(finalTranscript.trim());
    } else {
      setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
      if (wakeWordEnabled) startWakeWordListening();
    }
  };

  recognition.onerror = (e) => {
    clearTimeout(silenceTimer);
    if (e.error === 'no-speech') {
      // no-speech는 그냥 재시도 없이 대기 복귀
      setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
      if (wakeWordEnabled) startWakeWordListening();
    } else if (e.error !== 'aborted') {
      setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
      setTimeout(() => { if (wakeWordEnabled && state === 'standby') startWakeWordListening(); }, 1000);
    }
  };

  try { recognition.start(); } catch (e) {}
}

// ── 수동 리슨 버튼 — 토글 ──
function manualListen() {
  const btn = document.getElementById('btnListen');
  if (state === 'wake-listening') {
    // 이미 듣는 중 → 중지
    if (recognition) { recognition.stop(); recognition = null; }
    btn.textContent = 'LISTEN';
    setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
    if (wakeWordEnabled) startWakeWordListening();
  } else if (state === 'standby') {
    // 대기 중 → 시작
    btn.textContent = '■ STOP';
    if (recognition) { recognition.stop(); recognition = null; }
    triggerCommandMode();
  }
}

// ── 웨이크워드 토글 ──
function toggleWakeWord() {
  wakeWordEnabled = !wakeWordEnabled;
  const btn = document.getElementById('btnWake');
  btn.textContent = `WAKE WORD: ${wakeWordEnabled ? 'ON' : 'OFF'}`;
  if (wakeWordEnabled && state === 'standby') {
    startWakeWordListening();
  } else if (!wakeWordEnabled && recognition) {
    recognition.stop();
    recognition = null;
  }
}

// ── 전체 중지 ──
function stopAll() {
  synthesis.cancel();
  if (recognition) { recognition.stop(); recognition = null; }
  setState('standby', 'STANDBY — SAY "헤이 제이크" TO ACTIVATE');
  showInterim('');
  if (wakeWordEnabled) setTimeout(() => startWakeWordListening(), 500);
}

// ── 목소리 목록 로드 및 선택 UI ──
let selectedVoice = null;

function loadVoices() {
  const voices = synthesis.getVoices();
  if (!voices.length) return;

  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  const koVoices = voices.filter(v => v.lang.startsWith('ko'));
  const otherVoices = voices.filter(v => !v.lang.startsWith('ko'));
  const ordered = [...koVoices, ...otherVoices];

  ordered.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name.replace('Microsoft ', '')} (${v.lang})`;
    if (v.lang.startsWith('ko')) opt.style.color = '#00c8ff';
    sel.appendChild(opt);
  });

  // 기본: 여성 한국어 자동 선택
  const preferredKo =
    koVoices.find(v => /heami|InJoon|나은|yuna|여성|female/i.test(v.name)) ||
    koVoices[0];

  if (preferredKo) {
    sel.value = ordered.indexOf(preferredKo);
    selectedVoice = preferredKo;
  }

  sel.onchange = () => {
    selectedVoice = ordered[parseInt(sel.value)] || null;
    // 미리듣기
    synthesis.cancel();
    const test = new SpeechSynthesisUtterance('안녕하세요! 저 제이크예요.');
    if (selectedVoice) test.voice = selectedVoice;
    test.lang = selectedVoice?.lang || 'ko-KR';
    test.rate = 1.3;
    test.pitch = 1.15;
    synthesis.speak(test);
  };
}

synthesis.onvoiceschanged = loadVoices;

// ── 시작 ──
window.addEventListener('load', () => {
  // 짧은 딜레이 후 웨이크워드 시작
  setTimeout(() => {
    showSubtitle('시스템 초기화 완료. "헤이 제이크"라고 말씀하세요.', false);
    startWakeWordListening();
  }, 1200);
});
