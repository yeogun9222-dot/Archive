  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================================\n   LONGRISE — User Guide & Vision  ·  PRINT DOCUMENT\n   Self-contained. Follows the LONGRISE typography + visual styling,\n   structured as paginated A4-landscape document pages (print-ready).\n   No homepage chrome. Emoji-free; geometric gold/red markers only.\n   ===================================================================== */\n\n:root{\n  /* gold */\n  --gold-base:#b99a6b; --gold-hi:#e5c398; --gold-glow:#fbbf24; --gold2:#d97706;\n  /* signal */\n  --red-bright:#dc2626; --red-soft:#f0556a; --green:#34d399; --blue:#5aaeff;\n  /* surfaces */\n  --ink:#070504; --void:#0f0a09; --panel:#150f0d;\n  /* text */\n  --cream:#fcfaf7; --muted:#a79c93; --slate:#cbd5e1;\n  /* hairlines */\n  --line:rgba(185,154,107,.16); --line-mid:rgba(185,154,107,.32); --line-w:rgba(255,255,255,.07);\n  /* type */\n  --display:'Cinzel',Georgia,'Times New Roman',serif;\n  --body:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;\n  --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;\n}\n\n*{box-sizing:border-box;}\nhtml{ -webkit-text-size-adjust:100%; }\nbody{\n  margin:0;font-family:var(--body);color:var(--cream);\n  background:#000;\n  -webkit-font-smoothing:antialiased;\n}\n.app{\n  padding:34px 18px 60px;\n  background:\n    radial-gradient(circle at 18% 0%,rgba(127,29,29,.22),transparent 34%),\n    radial-gradient(circle at 86% 4%,rgba(251,191,36,.10),transparent 30%),\n    linear-gradient(180deg,#000,#070302 60%,#000);\n  min-height:100vh;\n}\n.sheets{display:flex;flex-direction:column;align-items:center;gap:30px;}\n\n/* ---- The page ---------------------------------------------------- */\n.sheet{\n  position:relative;width:297mm;min-height:210mm;\n  padding:11mm 16mm 11mm;\n  background:\n    radial-gradient(120% 70% at 50% -8%,rgba(185,154,107,.07),transparent 58%),\n    linear-gradient(180deg,#0c0807 0%,#070504 60%,#0a0605 100%);\n  border:1px solid var(--line);\n  box-shadow:0 40px 100px rgba(0,0,0,.7);\n  overflow:hidden;\n  -webkit-print-color-adjust:exact;print-color-adjust:exact;\n  display:flex;flex-direction:column;\n}\n/* thin inner gold frame for a premium printed feel */\n.sheet:after{content:\"\";position:absolute;inset:6mm;border:1px solid var(--line);\n  border-radius:2px;pointer-events:none;}\n\n/* ---- Running header / footer ------------------------------------- */\n.rhead{display:flex;align-items:center;justify-content:space-between;\n  padding-bottom:10px;margin-bottom:18px;border-bottom:1px solid var(--line);position:relative;z-index:2;}\n.rhead .brand{display:flex;align-items:center;gap:10px;}\n.rhead .brand img{height:22px;width:auto;display:block;filter:drop-shadow(0 3px 8px rgba(0,0,0,.5));}\n.rhead .wm{font-family:var(--display);font-weight:700;letter-spacing:.26em;font-size:14px;color:#fff;}\n.rhead .wm b{color:var(--gold-glow);font-weight:700;}\n.rhead .doc{font-size:9.5px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);\n  border-left:1px solid var(--line-mid);padding-left:12px;margin-left:2px;}\n.rhead .chap{font-family:var(--body);font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-glow);}\n\n.rfoot{position:absolute;left:16mm;right:16mm;bottom:8mm;display:flex;align-items:center;justify-content:space-between;\n  padding-top:9px;border-top:1px solid var(--line);z-index:2;}\n.rfoot span{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#80766c;}\n.rfoot .pg{color:var(--gold-base);font-variant-numeric:tabular-nums;}\n\n/* content fills between header and footer */\n.body-area{position:relative;z-index:2;flex:1;padding-bottom:14mm;}\n\n/* ---- Page title block -------------------------------------------- */\n.ptitle{margin-bottom:16px;}\n.chip{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;}\n.chip .n{font-family:var(--body);font-variant-numeric:tabular-nums;font-size:11px;font-weight:900;color:#0a0701;\n  background:linear-gradient(180deg,var(--gold-hi),var(--gold2));border-radius:6px;padding:4px 8px;letter-spacing:.03em;}\n.chip .l{font-size:10.5px;font-weight:900;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-glow);}\n.ptitle h2{font-family:var(--display);font-size:33px;font-weight:800;line-height:1.04;letter-spacing:.005em;\n  text-transform:uppercase;color:#fff;margin:0;}\n.ptitle h2 .gold{color:var(--gold-glow);}\n.ptitle .lead{margin:13px 0 0;max-width:175mm;color:#bfc4cd;font-size:13.5px;line-height:1.6;font-weight:500;}\n.ptitle .lead b{color:#fff;font-weight:600;}\n\n/* ---- COVER -------------------------------------------------------- */\n.cover{justify-content:center;}\n.cover:after{inset:7mm;}\n.cover .cover-in{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;\n  padding:6mm 4mm;}\n.cover .c-brand{display:flex;align-items:center;gap:13px;}\n.cover .c-brand img{height:34px;width:auto;}\n.cover .c-brand .wm{font-family:var(--display);font-weight:700;letter-spacing:.3em;font-size:21px;color:#fff;}\n.cover .c-brand .wm b{color:var(--gold-glow);}\n.cover .c-mid{margin-top:auto;margin-bottom:auto;}\n.cover .kicker{display:block;font-size:12px;font-weight:900;letter-spacing:.34em;text-transform:uppercase;\n  color:var(--gold-base);margin-bottom:20px;}\n.cover h1{font-family:var(--display);font-weight:900;font-size:78px;line-height:.96;letter-spacing:.005em;\n  text-transform:uppercase;margin:0;color:#fff;text-shadow:0 24px 70px #000;}\n.cover h1 .gold{display:block;\n  background:linear-gradient(96deg,var(--gold-base),var(--gold-glow) 42%,#fff4d6 52%,var(--gold-glow) 62%,var(--gold-base));\n  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;\n  filter:drop-shadow(0 18px 50px rgba(0,0,0,.8));margin-top:4px;}\n.cover .sub{margin:26px 0 0;max-width:170mm;color:#dfe3ea;font-size:16px;line-height:1.66;font-weight:500;}\n.cover .sub b{color:#fff;font-weight:600;}\n.cover .c-rule{height:1px;margin:30px 0 22px;\n  background:linear-gradient(90deg,var(--gold-glow),rgba(185,154,107,.25) 60%,transparent);}\n.cover .c-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:30px;}\n.cover .toc{display:grid;grid-template-columns:1fr 1fr;gap:6px 40px;flex:1;}\n.cover .toc a,.cover .toc div{display:flex;gap:12px;align-items:baseline;text-decoration:none;\n  padding:6px 0;border-bottom:1px solid var(--line);}\n.cover .toc .tn{font-family:var(--body);font-variant-numeric:tabular-nums;font-size:11px;font-weight:900;\n  color:var(--gold-glow);width:20px;flex:0 0 auto;}\n.cover .toc .tt{font-size:12px;color:var(--slate);font-weight:500;}\n.cover .c-meta{text-align:right;flex:0 0 auto;}\n.cover .c-meta b{display:block;font-family:var(--display);font-size:15px;color:#fff;letter-spacing:.08em;}\n.cover .c-meta span{display:block;margin-top:6px;font-size:9.5px;font-weight:800;letter-spacing:.18em;\n  text-transform:uppercase;color:var(--muted);}\n\n/* ---- Generic grids ----------------------------------------------- */\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n.g2x2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}\n.split-58{display:grid;grid-template-columns:1.32fr 1fr;gap:18px;align-items:stretch;}\n\n/* ---- Problem cards (Ch.01) --------------------------------------- */\n.prob{position:relative;overflow:hidden;border:1px solid var(--line);border-top:2px solid rgba(220,38,38,.5);\n  border-radius:14px;padding:22px 22px;\n  background:\n    radial-gradient(120% 80% at 50% -10%,rgba(127,29,29,.14),transparent 60%),\n    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));}\n.prob-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}\n.prob-idx{font-family:var(--body);font-variant-numeric:tabular-nums;font-size:12px;font-weight:900;color:var(--red-soft);\n  border:1px solid rgba(220,38,38,.4);border-radius:7px;padding:5px 9px;line-height:1;}\n.prob-tag{font-size:9.5px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}\n.prob h3{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.02em;line-height:1.18;color:var(--cream);margin:0 0 9px;}\n.prob p{margin:0;color:#aeb3bd;font-size:12.5px;line-height:1.6;}\n\n/* ---- Statement / quote ------------------------------------------- */\n.statement{position:relative;border:1px solid var(--line);border-radius:16px;padding:18px 26px 18px 30px;\n  background:rgba(6,4,3,.6);overflow:hidden;}\n.statement:before{content:\"\";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;\n  background:linear-gradient(180deg,var(--gold-glow),var(--gold2));}\n.statement p{margin:0;font-size:15.5px;line-height:1.6;color:#eef0f4;font-weight:500;}\n.statement b{color:var(--gold-glow);font-weight:700;}\n.statement.quote p{font-family:var(--display);font-weight:600;color:#fff;font-size:17px;line-height:1.5;}\n.statement .src{display:block;margin-top:13px;font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#80766c;}\n\n/* ---- Flow nodes (Ch.02) ------------------------------------------ */\n.flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:stretch;gap:14px;margin-top:18px;}\n.flow-node{position:relative;border:1px solid var(--line);border-radius:16px;padding:24px 22px;text-align:center;\n  background:\n    radial-gradient(120% 80% at 50% -10%,rgba(185,154,107,.10),transparent 60%),\n    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));\n  display:flex;flex-direction:column;align-items:center;}\n.flow-node .fn-mark{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;\n  border:1px solid var(--line-mid);background:rgba(0,0,0,.4);margin-bottom:15px;\n  font-family:var(--body);font-variant-numeric:tabular-nums;font-weight:900;font-size:15px;color:var(--gold-glow);}\n.flow-node h4{font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;margin:0 0 8px;line-height:1.15;}\n.flow-node p{margin:0;color:var(--muted);font-size:12px;line-height:1.5;}\n.flow-node.blue .fn-mark{color:var(--blue);border-color:rgba(90,174,255,.4);}\n.flow-node.green .fn-mark{color:var(--green);border-color:rgba(16,185,129,.4);}\n.flow-arrow{display:flex;align-items:center;justify-content:center;color:var(--gold-base);font-size:22px;}\n\n/* ---- Spec table (Ch.03) ------------------------------------------ */\n.spec-wrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:rgba(6,4,3,.5);}\n.spec{width:100%;border-collapse:collapse;font-family:var(--body);}\n.spec thead th{background:linear-gradient(180deg,rgba(251,191,36,.16),rgba(251,191,36,.06));color:var(--gold-glow);\n  font-size:10.5px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:14px 14px;text-align:left;\n  border-bottom:1px solid var(--line-mid);white-space:nowrap;}\n.spec tbody td{padding:15px 14px;font-size:13px;color:var(--slate);border-bottom:1px solid var(--line-w);\n  font-variant-numeric:tabular-nums;vertical-align:middle;}\n.spec tbody tr:last-child td{border-bottom:0;}\n.spec .tier{font-family:var(--display);font-weight:700;letter-spacing:.04em;color:#fff;font-size:14px;}\n.spec .price{font-weight:800;color:#fff;font-size:14.5px;}\n.spec .rate{font-weight:800;color:var(--gold-glow);}\n.spec .pos{color:var(--green);font-weight:700;}\n.spec .dim{color:#80766c;}\n.spec .bonus{color:var(--gold-base);font-weight:700;}\n.spec tr.is-core{background:linear-gradient(90deg,rgba(251,191,36,.13),rgba(251,191,36,.03));\n  box-shadow:inset 3px 0 0 var(--gold-glow);}\n.spec tr.is-core .tier{color:var(--gold-glow);}\n.core-flag{display:inline-block;margin-left:7px;font-size:8.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;\n  color:#0a0701;background:linear-gradient(180deg,var(--gold-hi),var(--gold2));border-radius:5px;padding:2px 6px;vertical-align:middle;}\n.spec .star{color:var(--gold-glow);}\n.spec-foot{display:flex;justify-content:center;gap:24px;align-items:center;margin-top:20px;color:#9a9a9a;font-size:12px;letter-spacing:.02em;}\n.spec-foot:before,.spec-foot:after{content:\"\";height:1px;width:80px;background:linear-gradient(90deg,transparent,rgba(251,191,36,.45));}\n.spec-foot:after{background:linear-gradient(90deg,rgba(251,191,36,.45),transparent);}\n\n/* ---- Big stat tile ----------------------------------------------- */\n.bigstat{border:1px solid rgba(251,191,36,.3);border-radius:14px;padding:22px 24px;text-align:center;\n  background:radial-gradient(120% 90% at 50% 0,rgba(251,191,36,.13),transparent 62%),\n    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));}\n.bigstat b{display:block;font-family:var(--body);font-variant-numeric:tabular-nums;font-size:50px;font-weight:800;\n  color:var(--gold-glow);line-height:1;letter-spacing:-.02em;text-shadow:0 12px 40px rgba(0,0,0,.6);}\n.bigstat span{display:block;margin-top:12px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.5;}\n.stat-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}\n\n/* ---- Bullet list -------------------------------------------------- */\n.glist{list-style:none;margin:16px 0 0;padding:0;display:flex;flex-direction:column;gap:12px;}\n.glist li{position:relative;padding-left:22px;color:#aeb3bd;font-size:13px;line-height:1.55;}\n.glist li:before{content:\"\";position:absolute;left:0;top:7px;width:8px;height:8px;border-radius:2px;background:var(--gold-glow);}\n.glist li b{color:#fff;font-weight:700;}\n\n/* ---- Generic content card ---------------------------------------- */\n.dcard{border:1px solid var(--line);border-radius:14px;padding:22px 22px;\n  background:radial-gradient(120% 80% at 50% -10%,rgba(185,154,107,.08),transparent 60%),\n    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));}\n.dcard .ce{display:flex;align-items:center;gap:10px;margin-bottom:13px;}\n.dcard .ce .t{font-size:9.5px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-glow);}\n.dcard h3{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.02em;color:#fff;margin:0 0 12px;}\n.dcard p{margin:0;color:#aeb3bd;font-size:12.5px;line-height:1.6;}\n.dcard .glist{margin-top:0;}\n\n/* ---- Risk cards (Ch.05) ------------------------------------------ */\n.risk-card{border-radius:16px;padding:24px 24px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));}\n.risk-card.danger{border:1px solid rgba(220,38,38,.4);\n  background:radial-gradient(120% 80% at 50% -10%,rgba(127,29,29,.18),transparent 60%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));}\n.risk-card.safe{border:1px solid rgba(16,185,129,.34);\n  background:radial-gradient(120% 80% at 50% -10%,rgba(16,185,129,.12),transparent 60%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));}\n.risk-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}\n.risk-pill{font-size:9.5px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;border-radius:999px;padding:6px 12px;line-height:1;}\n.danger .risk-pill{color:var(--red-soft);border:1px solid rgba(220,38,38,.45);background:rgba(220,38,38,.08);}\n.safe .risk-pill{color:var(--green);border:1px solid rgba(16,185,129,.4);background:rgba(16,185,129,.08);}\n.risk-card h3{font-family:var(--display);font-size:19px;font-weight:700;letter-spacing:.02em;color:#fff;margin:0;line-height:1.2;}\n.risk-card > p{color:#aeb3bd;font-size:12.5px;line-height:1.6;margin:0 0 16px;}\n.formula{display:block;font-family:var(--mono);font-size:11.5px;color:var(--gold-glow);border:1px solid var(--line);\n  border-radius:10px;padding:12px 14px;background:rgba(0,0,0,.4);margin:0 0 16px;line-height:1.5;}\n.tier-rows{display:flex;flex-direction:column;}\n.tier-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line-w);}\n.tier-row:last-child{border-bottom:0;}\n.tier-row .tr-label{font-size:12.5px;color:var(--slate);font-weight:600;}\n.tier-row .tr-fee{font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:800;color:var(--red-soft);text-align:right;min-width:74px;}\n.tier-row .tr-ref{font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:800;color:var(--green);text-align:right;min-width:78px;}\n.safe-note{display:flex;gap:13px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line-w);}\n.safe-note:last-child{border-bottom:0;}\n.safe-note .sn-key{font-variant-numeric:tabular-nums;font-weight:800;color:var(--green);font-size:15px;flex:0 0 auto;min-width:54px;}\n.safe-note .sn-key.gold{color:var(--gold-glow);}\n.safe-note p{margin:0;color:#aeb3bd;font-size:12.5px;line-height:1.55;}\n.safe-note b{color:#fff;font-weight:700;}\n\n/* ---- Roster (Ch.07) ---------------------------------------------- */\n.roster{border:1px solid var(--line);border-radius:16px;padding:16px 24px 6px;\n  background:radial-gradient(120% 80% at 50% -10%,rgba(185,154,107,.08),transparent 60%),linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));}\n.roster-head{display:flex;align-items:center;gap:12px;}\n.roster-head .rh-tag{font-size:9.5px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-glow);}\n.roster h3{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;margin:5px 0 4px;}\n.person{display:flex;gap:15px;padding:10px 0;border-bottom:1px solid var(--line-w);}\n.person:last-child{border-bottom:0;}\n.person .av{flex:0 0 auto;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;\n  font-family:var(--display);font-weight:700;font-size:15px;color:var(-
