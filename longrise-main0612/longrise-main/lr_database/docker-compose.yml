services:
  db:
    image: postgres:15
    container_name: ${CONTAINER_NAME:-longrise_database_postgres}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-longrise}
      POSTGRES_USER: ${POSTGRES_USER:-longrise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-longrise123!}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:-"--encoding=UTF-8"}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./schema:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-longrise} -d ${POSTGRES_DB:-longrise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - longrise_network

volumes:
  postgres_data:

networks:
  longrise_network:
    driver: bridge