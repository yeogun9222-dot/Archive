name: Run Staging Tests

on:
  workflow_dispatch:
    inputs:
      restore_seed_after_tests:
        description: Restore deterministic operational seed after tests mutate staging data
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  staging-tests:
    name: Staging Backend and User E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.LR_API_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Run backend operational smoke tests on staging
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.LR_API_EC2_HOST }} '
            cd /home/ubuntu/longrise/lr_fastapi || { echo "FastAPI directory not found"; exit 1; }
            source .venv/bin/activate
            ENVIRONMENT=staging python -m pytest tests/test_operational_smoke.py -q
            if [ "${{ inputs.restore_seed_after_tests }}" = "true" ]; then
              ENVIRONMENT=staging python seed_operational_data.py
            fi
          '

      - name: Health Check
        run: |
          check_url() {
            local label="$1"
            local url="$2"
            local method="${3:-GET}"

            echo "Checking ${label}..."
            for attempt in {1..12}; do
              if [ "$method" = "HEAD" ]; then
                if curl -fsSI "$url" >/dev/null; then
                  echo "${label} is healthy"
                  return 0
                fi
              else
                if curl -fsS "$url" >/dev/null; then
                  echo "${label} is healthy"
                  return 0
                fi
              fi
              sleep 5
            done

            echo "${label} health check failed: ${url}"
            return 1
          }

          check_url "API" "http://${{ secrets.LR_API_EC2_HOST }}:8000/health"
          check_url "User Frontend" "http://${{ secrets.LR_API_EC2_HOST }}:5173" "HEAD"
          check_url "Admin Frontend" "http://${{ secrets.LR_API_EC2_HOST }}:5174" "HEAD"

      - name: User Frontend Playwright E2E
        run: |
          npm ci
          npx playwright install --with-deps chromium
          E2E_SKIP_SEED=1 \
          E2E_FRONTEND_URL=http://${{ secrets.LR_API_EC2_HOST }}:5173 \
          E2E_API_URL=http://${{ secrets.LR_API_EC2_HOST }}:8000/api/v1 \
          npm run test:e2e:user
